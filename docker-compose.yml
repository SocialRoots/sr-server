name: sr-server
services:
  postgres:
    container_name: sr-postgres
    image: postgres:17.5-alpine
    environment: &db_env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      INT_POSTGRES_DB_NAME: ""
      INT_POSTGRES_USER: ""
      INT_POSTGRES_PASSWORD: ""
      INT_POSTGRES_HOST: ""
      INT_POSTGRES_PORT: ""
      STAGE_POSTGRES_DB_NAME: ""
      STAGE_POSTGRES_USER: ""
      STAGE_POSTGRES_PASSWORD: ""
      STAGE_POSTGRES_HOST: ""
      STAGE_POSTGRES_PORT: ""
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sr-network

  redis:
    container_name: sr-redis
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sr-network
    restart: unless-stopped
    command: redis-server

  orchestrator:
    container_name: sr-orchestrator
    build: modules/ORCHESTRATOR/
    ports:
      - "${ROOTSHOOT_ORCHESTRATOR_PORT}:${ROOTSHOOT_ORCHESTRATOR_PORT}"
    environment: &orchestrator_env
      <<: *db_env
      ENV: ${ENV}
      PORT: ${ROOTSHOOT_ORCHESTRATOR_PORT}
      LOCALENV: ${LOCALENV}
      POSTGRES_HOST: "sr-postgres"
      REDIS_HOST: "sr-redis"
      REDIS_EXPIRATION: ${REDIS_EXPIRATION}
      REDIS_KEY_HASH: ${REDIS_KEY_HASH}
      DISABLE_CACHE: ${DISABLE_CACHE}
      PROFILING_ENABLED: ${PROFILING_ENABLED}
      ROOTSHOOT_USERS_SERVICE: ${ROOTSHOOT_SERVER}:${ROOTSHOOT_USERS_SERVICE_PORT}
      ROOTSHOOT_GROUPS_SERVICE: ${ROOTSHOOT_SERVER}:${ROOTSHOOT_GROUPS_SERVICE_PORT}
      ROOTSHOOT_NOTES_SERVICE: ${ROOTSHOOT_SERVER}:${ROOTSHOOT_NOTES_SERVICE_PORT}
      ROOTSHOOT_RESPONSES_SERVICE: ${ROOTSHOOT_SERVER}:${ROOTSHOOT_RESPONSES_SERVICE_PORT}
      ROOTSHOOT_NOTIFICATIONS_SERVICE: ${ROOTSHOOT_SERVER}:${ROOTSHOOT_NOTIFICATIONS_SERVICE_PORT}
      ROOTSHOOT_CONNECTIONS_SERVICE: ${ROOTSHOOT_SERVER}:${ROOTSHOOT_CONNECTIONS_SERVICE_PORT}
      INTEGRATION_WEB_APP_HOST: ""
      STAGING_WEB_APP_HOST: ""
      CONVOX_INTEGRATION_DOMAIN: ""
      CONVOX_STAGING_DOMAIN: ""
      POSTHOG_API_KEY: ""
    command: /go/bin/api
    depends_on:
      - postgres
      - redis
    networks:
      - sr-network

  rs-users:
    container_name: sr-rs-users
    build: modules/RS-USERS/
    ports:
      - "${ROOTSHOOT_USERS_SERVICE_PORT}:${ROOTSHOOT_USERS_SERVICE_PORT}"
    environment: &service_env
      <<: *orchestrator_env
      API_PORT: "$ROOTSHOOT_USERS_SERVICE_PORT"
      POSTGRES_DB_NAME: "$DB_NAME_USERS"
      PASSWORD_COST: "$PASSWORD_COST"
      SIGNING_KEY: "$SIGNING_KEY"
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_REGION: ""
      AWS_IMAGE_BUCKET_NAME: ""
      SLACK_INCOMING_WEB_HOOK: ""
    command: /go/bin/web
    depends_on:
      - orchestrator
    networks:
      - sr-network

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgresql
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis

networks:
  sr-network:
    driver: bridge

