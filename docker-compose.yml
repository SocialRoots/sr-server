name: sr-server
services:
  postgres:
    container_name: sr-postgres
    image: postgres:17.5-alpine
    environment: &db_env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    shm_size: "2gb"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "temp_buffers=16MB"
      - "-c"
      - "work_mem=16MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sr-network

  redis:
    container_name: sr-redis
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sr-network
    restart: unless-stopped
    command: redis-server

  mailhog:
    container_name: sr-mailhog
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - sr-network
    restart: unless-stopped

  orchestrator:
    container_name: sr-orchestrator
    build: modules/ORCHESTRATOR/
    ports:
      - "${ROOTSHOOT_ORCHESTRATOR_PORT}:${ROOTSHOOT_ORCHESTRATOR_PORT}"
    environment: &orchestrator_env
      <<: *db_env
      ENV: ${ENV}
      PORT: ${ROOTSHOOT_ORCHESTRATOR_PORT}
      LOCALENV: ${LOCALENV}
      POSTGRES_HOST: "sr-postgres"
      REDIS_HOST: "sr-redis"
      REDIS_EXPIRATION: ${REDIS_EXPIRATION}
      REDIS_KEY_HASH: ${REDIS_KEY_HASH}
      DISABLE_CACHE: ${DISABLE_CACHE}
      PROFILING_ENABLED: ${PROFILING_ENABLED}
      ROOTSHOOT_USERS_SERVICE: "http://sr-rs-users:${ROOTSHOOT_USERS_SERVICE_PORT}"
      ROOTSHOOT_GROUPS_SERVICE: "http://sr-rs-groups:${ROOTSHOOT_GROUPS_SERVICE_PORT}"
      ROOTSHOOT_NOTES_SERVICE: "http://sr-rs-notes:${ROOTSHOOT_NOTES_SERVICE_PORT}"
      ROOTSHOOT_RESPONSES_SERVICE: "http://sr-rs-responses:${ROOTSHOOT_RESPONSES_SERVICE_PORT}"
      ROOTSHOOT_NOTIFICATIONS_SERVICE: "http://sr-rs-notifications:${ROOTSHOOT_NOTIFICATIONS_SERVICE_PORT}"
      ROOTSHOOT_CONNECTIONS_SERVICE: "http://sr-rs-connections:${ROOTSHOOT_CONNECTIONS_SERVICE_PORT}"
      WEB_APP_HOST: ${WEB_APP_HOST}
      POSTHOG_API_KEY: ""
    command: /go/bin/api
    depends_on:
      - postgres
      - redis
    networks:
      - sr-network

  s3-minio:
    container_name: sr-s3-minio
    image: minio/minio:latest
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sr-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: sr-minio-init
    depends_on:
      - s3-minio
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_HOST: ${S3_HOST}
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set srminio ${S3_HOST} ${MINIO_ROOT_USER} 
      ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb srminio/${MINIO_DEFAULT_BUCKET} --ignore-existing;
      /usr/bin/mc anonymous set public srminio/${MINIO_DEFAULT_BUCKET};
      /usr/bin/mc admin user add srminio ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
      /usr/bin/mc admin policy attach srminio readwrite --user ${S3_ACCESS_KEY_ID};
      echo 'Bucket and access keys configured successfully';
      exit 0;
      "
    networks:
      - sr-network

  rs-users:
    container_name: sr-rs-users
    build: modules/RS-USERS/
    ports:
      - "${ROOTSHOOT_USERS_SERVICE_PORT}:${ROOTSHOOT_USERS_SERVICE_PORT}"
    environment: &service_env
      <<: *orchestrator_env
      API_PORT: ${ROOTSHOOT_USERS_SERVICE_PORT}
      POSTGRES_DB_NAME: ${DB_NAME_USERS}
      PASSWORD_COST: ${PASSWORD_COST}
      SIGNING_KEY: ${SIGNING_KEY}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_IMAGE_BUCKET_NAME: ${MINIO_DEFAULT_BUCKET}
      AWS_S3_ENDPOINT: ${S3_HOST}
      SLACK_INCOMING_WEB_HOOK: ""
      REPLYTO: "${REPLYTO}"
      MAILGUN_ADDRESS: "${MAILGUN_ADDRESS}"
      MAILGUN_USERNAME: "${MAILGUN_USERNAME}"
      MAILGUN_PASSWORD: "${MAILGUN_PASSWORD}"
      MAILGUN_HOST: "${MAILGUN_HOST}"
    command: /go/bin/web
    depends_on:
      - orchestrator
      - minio-init
    networks:
      - sr-network

  rs-notes:
    container_name: sr-rs-notes
    build: modules/RS-NOTES/
    ports:
      - "${ROOTSHOOT_NOTES_SERVICE_PORT}:${ROOTSHOOT_NOTES_SERVICE_PORT}"
    environment:
      <<: *service_env
      API_PORT: ${ROOTSHOOT_NOTES_SERVICE_PORT}
      POSTGRES_DB_NAME: ${DB_NAME_NOTES}
      NGROK: off
      NGROK_RESPONSE_HOST: ""
      TEMPLATE_SAMPLE_NOTE_ID: 1
      EMAIL_WHITELIST: "${EMAIL_WHITELIST}"
    command: /go/bin/web
    depends_on:
      - orchestrator
    networks:
      - sr-network

  rs-groups:
    container_name: sr-rs-groups
    build: modules/RS-GROUPS/
    ports:
      - "${ROOTSHOOT_GROUPS_SERVICE_PORT}:${ROOTSHOOT_GROUPS_SERVICE_PORT}"
    environment:
      <<: *service_env
      API_PORT: ${ROOTSHOOT_GROUPS_SERVICE_PORT}
      POSTGRES_DB_NAME: ${DB_NAME_GROUPS}
    command: /go/bin/web
    depends_on:
      - orchestrator
    networks:
      - sr-network

  rs-connections:
    container_name: sr-rs-connections
    build: modules/RS-CONNECTIONS/
    ports:
      - "${ROOTSHOOT_CONNECTIONS_SERVICE_PORT}:${ROOTSHOOT_CONNECTIONS_SERVICE_PORT}"
    environment:
      <<: *service_env
      API_PORT: ${ROOTSHOOT_CONNECTIONS_SERVICE_PORT}
      POSTGRES_DB_NAME: ${DB_NAME_CONNECTIONS}
    command: /go/bin/web
    depends_on:
      - orchestrator
    networks:
      - sr-network

  rs-notifications:
    container_name: sr-rs-notifications
    build: modules/RS-NOTIFICATIONS/
    ports:
      - "${ROOTSHOOT_NOTIFICATIONS_SERVICE_PORT}:${ROOTSHOOT_NOTIFICATIONS_SERVICE_PORT}"
    environment:
      <<: *service_env
      API_PORT: ${ROOTSHOOT_NOTIFICATIONS_SERVICE_PORT}
      POSTGRES_DB_NAME: ${DB_NAME_NOTIFICATIONS}
      LOCAL_OVERRIDES: ""
    command: /go/bin/web
    depends_on:
      - orchestrator
    networks:
      - sr-network

  rs-notifications-cron:
    container_name: sr-rs-notifications-cron
    build: modules/RS-NOTIFICATIONS/
    environment:
      <<: *service_env
      POSTGRES_DB_NAME: ${DB_NAME_NOTIFICATIONS}
      LOCAL_OVERRIDES: ""
    command: sh -c "while true; do /go/bin/cron; sleep 300; done"
    depends_on:
      - orchestrator
    networks:
      - sr-network
    restart: unless-stopped

  rs-responses:
    container_name: sr-rs-responses
    build: modules/RS-RESPONSES/
    ports:
      - "${ROOTSHOOT_RESPONSES_SERVICE_PORT}:${ROOTSHOOT_RESPONSES_SERVICE_PORT}"
    environment:
      <<: *service_env
      API_PORT: ${ROOTSHOOT_RESPONSES_SERVICE_PORT}
      POSTGRES_DB_NAME: ${DB_NAME_RESPONSES}
    command: /go/bin/web
    depends_on:
      - orchestrator
    networks:
      - sr-network

  sr-next:
    container_name: sr-next
    restart: unless-stopped
    image: sr-next:${VERSION}
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    networks:
      - sr-network


volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgresql
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/minio

networks:
  sr-network:
    driver: bridge

